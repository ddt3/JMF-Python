name: Build and Release

on:
  push:
    tags:
      - 'R[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Build tools
        run: |
          python -m pip install pyinstaller
          cd buildspec
          python build_tools.py all
      
      - name: Extract version from tag
        id: version
        run: |
          $tag = '${{ github.ref_name }}'
          $version = $tag -replace '^R', ''
          echo "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      
      - name: Create version file
        run: |
          $version = '${{ steps.version.outputs.version }}'
          $versionContent = @"
          JMF-Python Release $version
          Built on: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss UTC')
          "@
          Set-Content -Path "buildspec/dist/version.txt" -Value $versionContent
      
      - name: Create release zip
        run: |
          cd buildspec/dist
          $zipName = "JMF-Python-${{ steps.version.outputs.version }}.zip"
          Compress-Archive -Path *.exe, version.txt -DestinationPath $zipName
          echo "ZIP_FILE=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        id: zip
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: buildspec/dist/JMF-Python-${{ steps.version.outputs.version }}.zip
          tag_name: ${{ github.ref_name }}
          name: 'JMF-Python ${{ steps.version.outputs.version }}'
          draft: false
          prerelease: false
