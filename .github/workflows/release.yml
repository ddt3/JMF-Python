name: Build and Release

on:
  push:
    tags:
      - 'R[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Build tools
        run: |
          python -m pip install pyinstaller
          cd buildspec
          python build_tools.py all
      
      - name: Extract version from tag
        id: version
        run: |
          $tag = '${{ github.ref_name }}'
          $version = $tag -replace '^R', ''
          echo "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      
      - name: Install markdown converter
        run: python -m pip install markdown
      
      - name: Convert README to HTML
        run: |
          python -c "
          import markdown
          from pathlib import Path
          md = Path('Tools/README.md').read_text(encoding='utf-8')
          body = markdown.markdown(md, extensions=['tables'])
          html = f'''<!DOCTYPE html>
          <html lang=\"en\"><head><meta charset=\"UTF-8\">
          <title>JMF Tools</title>
          <style>body{{font-family:sans-serif;max-width:900px;margin:2em auto;padding:0 1em}}table{{border-collapse:collapse;width:100%}}th,td{{border:1px solid #ccc;padding:6px 10px}}th{{background:#f0f0f0}}code{{background:#f4f4f4;padding:2px 4px;border-radius:3px}}pre{{background:#f4f4f4;padding:1em;overflow-x:auto}}</style>
          </head><body>{body}</body></html>'''
          Path('buildspec/dist/JMF-Tools-README.html').write_text(html, encoding='utf-8')
          "
      
      - name: Create release zip
        id: zip
        run: |
          cd buildspec/dist
          $zipName = "JMF-Python-${{ steps.version.outputs.version }}.zip"
          Compress-Archive -Path *.exe, JMF-Tools-README.html -DestinationPath $zipName
          echo "ZIP_FILE=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: buildspec/dist/JMF-Python-${{ steps.version.outputs.version }}.zip
          tag_name: ${{ github.ref_name }}
          name: 'JMF-Python ${{ steps.version.outputs.version }}'
          draft: false
          prerelease: false
